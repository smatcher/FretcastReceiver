<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Fretcast</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0D0D0D;
      color: #E5E5E5;
      font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
    }

    /* ── Waiting screen ─────────────────────────────────────── */
    #waiting {
      display: flex;
      width: 100%; height: 100%;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
    }
    #waiting-title    { font-size: 80px; font-weight: 600; color: #F59E0B; letter-spacing: -2px; }
    #waiting-subtitle { font-size: 28px; color: #3A3A3A; }

    /* ── Exercise screen ────────────────────────────────────── */
    #exercise {
      display: none;
      width: 100%; height: 100%;
      flex-direction: column;
      padding: 48px 72px 40px;
      gap: 24px;
    }

    #top-bar { display: flex; align-items: baseline; gap: 20px; flex-shrink: 0; }
    #key-label   { font-size: 80px; font-weight: 700; color: #F59E0B; letter-spacing: -3px; line-height: 1; }
    #scale-label { font-size: 30px; color: #555; }
    #bpm-label   { margin-left: auto; font-size: 26px; color: #333; }

    #canvas-wrapper { flex: 1; min-height: 0; }
    #neck { display: block; width: 100%; height: 100%; }

    #bottom-bar {
      display: flex;
      align-items: center;
      gap: 32px;
      flex-shrink: 0;
      height: 40px;
    }
    #beats { display: flex; gap: 10px; }
    .beat { width: 14px; height: 14px; border-radius: 50%; background: #252525; }
    .beat.on { background: #F59E0B; }
    #next-key-label { font-size: 24px; color: #444; }
    #next-key-label b { color: #B07010; font-weight: 500; }
    #bar-label { margin-left: auto; font-size: 22px; color: #2A2A2A; }
  </style>
</head>
<body>

<div id="waiting">
  <div id="waiting-title">Fretcast</div>
  <div id="waiting-subtitle">Ready for your practice session</div>
</div>

<div id="exercise">
  <div id="top-bar">
    <div id="key-label">C</div>
    <div id="scale-label">Major</div>
    <div id="bpm-label">80 BPM</div>
  </div>
  <div id="canvas-wrapper">
    <canvas id="neck"></canvas>
  </div>
  <div id="bottom-bar">
    <div id="beats"></div>
    <div id="next-key-label"></div>
    <div id="bar-label"></div>
  </div>
</div>

<script src="//www.gstatic.com/cast/sdk/libs/caf_receiver/v3/cast_receiver_framework.js"></script>
<script>
'use strict';

const NAMESPACE    = 'urn:x-cast:com.fretcast.app';
const AMBER        = '#F59E0B';
const BLUE         = '#60A5FA';
const GREEN        = '#34D399';
const GRAY         = '#888888';
const INLAYS       = new Set([3, 5, 7, 9, 12, 15, 17, 19, 21, 24]);
const FRET_WINDOW  = 7;   // fret slots visible at once

function roleColor(role) {
  if (role === 'ROOT')  return AMBER;
  if (role === 'THIRD') return BLUE;
  if (role === 'FIFTH') return GREEN;
  return GRAY;
}

function hexRgb(hex) {
  return `${parseInt(hex.slice(1,3),16)},${parseInt(hex.slice(3,5),16)},${parseInt(hex.slice(5,7),16)}`;
}

// ── Flash animation ────────────────────────────────────────────────────────────

let state        = null;
let brightness   = 0.2;
let flashStartMs = 0;
let beatMs       = 750;
let rafId        = null;

function startFlash(bpm) {
  brightness   = 1.0;
  flashStartMs = performance.now();
  beatMs       = 60000 / bpm;
  if (rafId) cancelAnimationFrame(rafId);
  (function loop() {
    const t = Math.min((performance.now() - flashStartMs) / beatMs, 1);
    brightness = 1.0 - t * 0.8;  // 1.0 → 0.2
    drawNeck();
    if (t < 1) rafId = requestAnimationFrame(loop);
  })();
}

// ── Fretboard canvas ───────────────────────────────────────────────────────────

function drawNeck() {
  if (!state) return;
  const canvas = document.getElementById('neck');
  const ctx    = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;
  ctx.clearRect(0, 0, W, H);

  const fo      = state.fretOffset || 0;
  const hasNut  = fo === 0;
  const STRINGS = 6;
  const NUT_W   = hasNut ? 10 : 0;
  const PAD_L   = hasNut ? 56 : 32;
  const PAD_R   = 32, PAD_T = 28, PAD_B = 20;

  const neckLeft  = PAD_L + NUT_W;
  const neckRight = W - PAD_R;
  const fretW     = (neckRight - neckLeft) / FRET_WINDOW;
  const neckH     = H - PAD_T - PAD_B;
  const strGap    = neckH / (STRINGS - 1);

  // Nut
  if (hasNut) {
    ctx.fillStyle = '#9A7010';
    ctx.fillRect(PAD_L, PAD_T, NUT_W, neckH);
  }

  // Fret wires
  for (let k = 0; k <= FRET_WINDOW; k++) {
    const x = neckLeft + k * fretW;
    ctx.beginPath();
    ctx.strokeStyle = 'rgba(90,90,90,0.4)';
    ctx.lineWidth   = 1;
    ctx.moveTo(x, PAD_T);
    ctx.lineTo(x, PAD_T + neckH);
    ctx.stroke();
  }

  // Strings
  for (let s = 0; s < STRINGS; s++) {
    const y = PAD_T + s * strGap;
    ctx.beginPath();
    ctx.strokeStyle = 'rgba(140,140,140,0.4)';
    ctx.lineWidth   = 1 + (STRINGS - 1 - s) * 0.45;  // low E thickest
    ctx.moveTo(hasNut ? PAD_L : neckLeft, y);
    ctx.lineTo(neckRight, y);
    ctx.stroke();
  }

  // Inlay dots
  const midY = PAD_T + neckH / 2;
  for (let slot = 0; slot < FRET_WINDOW; slot++) {
    const actual = fo === 0 ? slot + 1 : fo + slot;
    if (!INLAYS.has(actual)) continue;
    const x       = neckLeft + (slot + 0.5) * fretW;
    const isDouble = actual === 12 || actual === 24;
    const inlayR  = 5;
    if (isDouble) {
      dot(ctx, x, midY - strGap, inlayR, 'rgba(255,255,255,0.10)');
      dot(ctx, x, midY + strGap, inlayR, 'rgba(255,255,255,0.10)');
    } else {
      dot(ctx, x, midY, inlayR, 'rgba(255,255,255,0.10)');
    }
  }

  // Note dots
  const noteRoles = state.noteRoles || {};
  const seq       = state.noteSequence || [];
  const curNote   = seq[state.currentNoteIndex != null ? state.currentNoteIndex : 0];
  const curKey    = curNote ? `${curNote[0]},${curNote[1]}` : null;
  const dotR      = Math.min(fretW, strGap) * 0.30;
  const strokeW   = Math.max(1.5, dotR * 0.14);

  for (const [key, role] of Object.entries(noteRoles)) {
    const [si, fi] = key.split(',').map(Number);
    const isCurrent = key === curKey;
    const color   = roleColor(role);
    const rgb     = hexRgb(color);
    const fillA   = isCurrent ? brightness        : 0.12;
    const strokeA = isCurrent ? brightness        : 0.50;
    const y       = PAD_T + si * strGap;

    if (fi === 0 && hasNut) {
      // Open string: left-facing D-shape centered on the nut
      ctx.beginPath();
      ctx.arc(neckLeft, y, dotR, Math.PI / 2, -Math.PI / 2, false);
      ctx.fillStyle = `rgba(${rgb},${fillA})`;   ctx.fill();
      ctx.beginPath();
      ctx.arc(neckLeft, y, dotR, Math.PI / 2, -Math.PI / 2, false);
      ctx.strokeStyle = `rgba(${rgb},${strokeA})`; ctx.lineWidth = strokeW; ctx.stroke();
    } else {
      const slot = fo === 0 ? fi - 1 : fi - fo;
      if (slot < 0 || slot >= FRET_WINDOW) continue;
      const x = neckLeft + (slot + 0.5) * fretW;
      ctx.beginPath();
      ctx.arc(x, y, dotR, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(${rgb},${fillA})`; ctx.fill();
      ctx.beginPath();
      ctx.arc(x, y, dotR, 0, Math.PI * 2);
      ctx.strokeStyle = `rgba(${rgb},${strokeA})`; ctx.lineWidth = strokeW; ctx.stroke();
    }
  }
}

function dot(ctx, x, y, r, color) {
  ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI * 2);
  ctx.fillStyle = color; ctx.fill();
}

// ── UI ─────────────────────────────────────────────────────────────────────────

let lastNoteIdx = -1;

function updateUI(s) {
  document.getElementById('waiting').style.display = 'none';
  document.getElementById('exercise').style.display = 'flex';

  document.getElementById('key-label').textContent   = s.key;
  document.getElementById('scale-label').textContent = s.scale;
  document.getElementById('bpm-label').textContent   = `${s.bpm} BPM`;

  // Beat dots
  const beatsEl = document.getElementById('beats');
  if (beatsEl.children.length !== s.beatsPerBar) {
    beatsEl.innerHTML = '';
    for (let i = 0; i < s.beatsPerBar; i++) {
      const d = document.createElement('div'); d.className = 'beat'; beatsEl.appendChild(d);
    }
  }
  Array.from(beatsEl.children).forEach((d, i) => d.classList.toggle('on', i + 1 === s.beat));

  // Next key
  const nkEl = document.getElementById('next-key-label');
  nkEl.innerHTML = s.nextKey ? `Next: <b>${s.nextKey}</b>` : '';

  // Bar progress
  const barEl = document.getElementById('bar-label');
  barEl.textContent = s.totalBars > 0 ? `Bar ${s.currentBar} / ${s.totalBars}` : '';

  // Flash on new note
  if (s.currentNoteIndex !== lastNoteIdx) {
    lastNoteIdx = s.currentNoteIndex;
    startFlash(s.bpm);
  } else {
    drawNeck();
  }
}

function resizeCanvas() {
  const wrap   = document.getElementById('canvas-wrapper');
  const canvas = document.getElementById('neck');
  canvas.width  = wrap.clientWidth;
  canvas.height = wrap.clientHeight;
  drawNeck();
}

window.addEventListener('resize', resizeCanvas);
setTimeout(resizeCanvas, 100);

// ── Cast ───────────────────────────────────────────────────────────────────────

const castCtx = cast.framework.CastReceiverContext.getInstance();
castCtx.addCustomMessageListener(NAMESPACE, event => {
  try {
    state = typeof event.data === 'string' ? JSON.parse(event.data) : event.data;
    console.log('Message received, key=' + state.key + ' beat=' + state.beat);
    if (!document.getElementById('neck').width) resizeCanvas();
    updateUI(state);
  } catch (e) {
    console.error('Message handler error:', e, event.data);
  }
});
castCtx.start({ disableIdleTimeout: true });
</script>
</body>
</html>
